<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128">
  <!-- Background Circle (Chrome Blue) -->
  <circle cx="16" cy="16" r="15" fill="#4285F4"/>
  
  <!-- Body -->
  <rect x="12" y="8" width="8" height="8" fill="#2d5016"/>
  <rect x="14" y="10" width="4" height="4" fill="#3d6820"/>
  <!-- Head -->
  <rect x="13" y="4" width="6" height="4" fill="#2d5016"/>
  <rect x="14" y="5" width="4" height="2" fill="#3d6820"/>
  <!-- Eyes -->
  <rect x="13" y="6" width="2" height="2" fill="#fff"/>
  <rect x="17" y="6" width="2" height="2" fill="#fff"/>
  <!-- Eye patch (pirate!) -->
  <rect x="11" y="5" width="8" height="1" fill="#1a1a1a"/>
  <rect x="12" y="6" width="1" height="2" fill="#1a1a1a"/>
  <rect x="19" y="6" width="1" height="2" fill="#1a1a1a"/>
  <!-- Eye patch string -->
  <rect x="11" y="5" width="1" height="1" fill="#8B0000"/>
  <rect x="20" y="5" width="1" height="1" fill="#8B0000"/>
  <!-- Legs -->
  <rect x="10" y="10" width="2" height="6" fill="#1a3009"/>
  <rect x="20" y="10" width="2" height="6" fill="#1a3009"/>
  <rect x="11" y="12" width="1" height="2" fill="#3d6820"/>
  <rect x="20" y="12" width="1" height="2" fill="#3d6820"/>
  <rect x="9" y="16" width="2" height="4" fill="#1a3009"/>
  <rect x="21" y="16" width="2" height="4" fill="#1a3009"/>
  <rect x="10" y="18" width="1" height="2" fill="#3d6820"/>
  <rect x="21" y="18" width="1" height="2" fill="#3d6820"/>
  <rect x="8" y="20" width="2" height="4" fill="#1a3009"/>
  <rect x="22" y="20" width="2" height="4" fill="#1a3009"/>
  <!-- Abdomen -->
  <rect x="13" y="16" width="6" height="8" fill="#2d5016"/>
  <rect x="14" y="18" width="4" height="4" fill="#3d6820"/>
  <rect x="13" y="22" width="6" height="4" fill="#1a3009"/>
  <!-- Wings -->
  <rect x="6" y="9" width="5" height="3" fill="#ffffff" opacity="0.8"/>
  <rect x="21" y="9" width="5" height="3" fill="#ffffff" opacity="0.8"/>
  <rect x="5" y="8" width="2" height="1" fill="#ffffff" opacity="0.6"/>
  <rect x="25" y="8" width="2" height="1" fill="#ffffff" opacity="0.6"/>
  <!-- Proboscis -->
  <rect x="15" y="1" width="2" height="3" fill="#8B4513"/>
  <rect x="16" y="0" width="1" height="1" fill="#654321"/>
  <!-- Pirate hat band -->
  <rect x="11" y="3" width="10" height="1" fill="#FFD700"/>
</svg>
