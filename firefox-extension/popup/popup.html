<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpaceMosquito</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <div class="logo">
        <svg class="mosquito-icon" viewBox="0 0 32 32" width="24" height="24">
          <rect x="12" y="8" width="8" height="8" fill="#2d5016"/>
          <rect x="10" y="10" width="2" height="4" fill="#1a3009"/>
          <rect x="20" y="10" width="2" height="4" fill="#1a3009"/>
          <rect x="14" y="16" width="4" height="4" fill="#2d5016"/>
          <rect x="13" y="20" width="6" height="6" fill="#3d6820"/>
          <rect x="8" y="22" width="2" height="4" fill="#1a3009"/>
          <rect x="22" y="22" width="2" height="4" fill="#1a3009"/>
          <rect x="10" y="20" width="2" height="2" fill="#1a3009"/>
          <rect x="20" y="20" width="2" height="2" fill="#1a3009"/>
          <rect x="14" y="26" width="2" height="4" fill="#1a3009"/>
          <rect x="16" y="26" width="2" height="4" fill="#1a3009"/>
          <rect x="13" y="6" width="6" height="2" fill="#8B0000"/>
          <rect x="15" y="9" width="4" height="2" fill="#111"/>
          <rect x="13" y="10" width="2" height="2" fill="#fff"/>
          <rect x="17" y="10" width="2" height="2" fill="#111"/>
          <rect x="14" y="12" width="2" height="2" fill="#111"/>
          <rect x="20" y="14" width="8" height="1" fill="#1a3009"/>
          <rect x="22" y="13" width="1" height="3" fill="#1a3009"/>
          <rect x="27" y="15" width="2" height="1" fill="#1a3009"/>
        </svg>
        <span class="title">SpaceMosquito</span>
      </div>
      <div id="session-dot" class="status-dot" title="Checking session..."></div>
    </header>

    <!-- Tab Navigation -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="session">Session</button>
      <button class="tab-btn" data-tab="crawl">Crawl</button>
      <button class="tab-btn" data-tab="settings">Settings</button>
    </nav>

    <!-- Session Tab -->
    <div class="tab-content active" id="tab-session">
      <div class="session-status" id="session-status">
        <p class="status-text" id="session-status-text">Checking session...</p>
      </div>

      <div class="actions">
        <button id="btn-capture" class="btn btn-primary">Capture Session</button>
        <button id="btn-validate" class="btn btn-secondary">Validate Session</button>
        <button id="btn-delete" class="btn btn-danger hidden">Delete Session</button>
      </div>

      <div class="session-info hidden" id="session-info">
        <p><span class="label">Cookies:</span> <span id="cookie-count">0</span></p>
        <p><span class="label">Expires:</span> <span id="session-expires">--</span></p>
      </div>
    </div>

    <!-- Crawl Tab -->
    <div class="tab-content" id="tab-crawl">
      <div class="current-space" id="current-space">
        <p class="space-label">Current Space:</p>
        <p id="current-space-name" class="space-value">Detecting...</p>
      </div>

      <button id="btn-start-crawl" class="btn btn-primary btn-full">Crawl Current Space</button>

      <div class="crawl-progress hidden" id="crawl-progress">
        <div class="progress-header">
          <span id="crawl-status">Running...</span>
          <span id="crawl-percent">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>
        <div class="crawl-stats">
          <span id="crawl-pages">Page 0/0</span>
          <span id="crawl-completed">Completed: 0</span>
          <span id="crawl-failed">Failed: 0</span>
        </div>
        <div id="crawl-error" class="crawl-error hidden"></div>
        <button id="btn-cancel-crawl" class="btn btn-danger btn-small hidden">Cancel</button>
        <button id="btn-cleanup" class="btn btn-secondary btn-small hidden">Cleanup</button>
      </div>

      <div class="active-jobs hidden" id="active-jobs">
        <p class="label">Active Jobs:</p>
        <ul id="jobs-list" class="jobs-list"></ul>
      </div>
    </div>

    <!-- Settings Tab -->
    <div class="tab-content" id="tab-settings">
      <div class="settings-group">
        <h3>Backend</h3>
        <div class="input-group">
          <input type="text" id="backend-url" class="input" placeholder="http://localhost:8081">
          <button id="btn-save-url" class="btn btn-small">Save</button>
        </div>
      </div>

      <div class="settings-group">
        <h3>Spaces</h3>
        <div class="input-group">
          <input type="text" id="add-space-url" class="input" placeholder="https://tenant.atlassian.net/wiki/spaces/KEY/overview">
          <button id="btn-add-space" class="btn btn-small">Add</button>
        </div>
        <ul id="spaces-list" class="spaces-list"></ul>
        <button id="btn-crawl-all" class="btn btn-primary btn-full hidden">Crawl All Spaces</button>
      </div>

      <div class="settings-group">
        <h3>Cron Configuration</h3>
        <p class="info-text">Configure crawl intervals per space below.</p>
        <div id="cron-configs" class="cron-configs"></div>
        <button id="btn-save-cron" class="btn btn-secondary btn-full hidden">Save & Reload Cron</button>
      </div>

      <div class="settings-group">
        <h3>About</h3>
        <p class="version-text">SpaceMosquito v0.1.0</p>
      </div>
    </div>
  </div>

  <script src="popup/popup.js"></script>
</body>
</html>
