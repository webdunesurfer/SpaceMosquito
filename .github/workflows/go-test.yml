name: Go Tests

on:
  push:
    paths:
      - "space-mosquito/**"
      - ".github/workflows/go-test.yml"
  pull_request:
    paths:
      - "space-mosquito/**"
      - ".github/workflows/go-test.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: space-mosquito

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: space-mosquito/go.mod
          cache-dependency-path: space-mosquito/go.sum

      - name: Run unit tests
        run: go test -race ./...
